<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sweety Home</title>
  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body class="home">
  <main class="screen" aria-label="home screen">
    <section class="artboard" aria-label="402x874 base layout">
      <div class="next-layer" id="nextLayer">
        <div class="bg-image" aria-hidden="true"></div>
        <div class="top-dim" aria-hidden="true"></div>
        <header class="top-header" aria-label="브랜드 헤더">
          <img class="brand-logo" src="./assets/image/home/sweety.svg" alt="Sweety" />
          <button class="search-button" type="button" aria-label="검색">
            <img src="./assets/image/home/search.svg" alt="" />
          </button>
        </header>

        <div class="content-area" aria-label="main content"></div>

        <nav class="tab-overlay" aria-label="탭 바">
          <ul class="tab-list">
            <li class="tab-item">
              <button class="tab-button" type="button" aria-label="홈">
                <img src="./assets/image/tabs/home.svg" alt="" />
                <span class="tab-label">홈</span>
              </button>
            </li>
            <li class="tab-item">
              <button class="tab-button" type="button" aria-label="쇼핑">
                <img src="./assets/image/tabs/bag.svg" alt="" />
                <span class="tab-label">쇼핑</span>
              </button>
            </li>
            <li class="tab-item">
              <button class="tab-button" type="button" aria-label="관심">
                <img src="./assets/image/tabs/heart.svg" alt="" />
                <span class="tab-label">관심</span>
              </button>
            </li>
            <li class="tab-item">
              <button class="tab-button" type="button" aria-label="선물">
                <img src="./assets/image/tabs/present.svg" alt="" />
                <span class="tab-label">선물</span>
              </button>
            </li>
            <li class="tab-item">
              <button class="tab-button" type="button" aria-label="내 계정">
                <img src="./assets/image/tabs/person.svg" alt="" />
                <span class="tab-label">내 계정</span>
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </section>
  </main>

  <script src="./assets/js/flow-navigation.js"></script>
  <script src="./assets/js/home-screen.js"></script>
</body>
</html>
